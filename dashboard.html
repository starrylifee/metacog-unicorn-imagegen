<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — 감상 이미지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0D0D0D;--white:#fff;
  --lime:#C8FA4C;--lilac:#E4DEFF;--soft:#F4F4F2;--line:#E4E4E2;--coral:#FF8B70;
  --r32:32px;--r16:16px;--r8:8px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--white);color:var(--black);font-size:16px;font-weight:350;line-height:1.5;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);height:58px;display:flex;align-items:center;padding:0 var(--r32);justify-content:space-between}
.logo{font-size:17px;font-weight:600;letter-spacing:-.4px;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;background:var(--lime);border-radius:50%;border:2px solid var(--black)}
.btn{border:none;border-radius:50px;padding:9px 20px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center}
.btn-dark{background:var(--black);color:var(--white)}.btn-dark:hover{opacity:.82}
.btn-out{background:transparent;color:var(--black);border:1.5px solid var(--black)}.btn-out:hover{background:var(--soft)}
.btn-red{background:transparent;color:#c33;border:1.5px solid #c33;font-size:13px;padding:6px 14px}.btn-red:hover{background:#fff0f0}

.hero{padding:56px var(--r32) 32px;max-width:1200px;margin:0 auto}
.hero h1{font-size:clamp(32px,4vw,56px);font-weight:380;letter-spacing:-1.5px;margin-bottom:8px}
.hero-sub{font-size:16px;color:#666;margin-bottom:24px}

.toolbar{max-width:1200px;margin:0 auto;padding:0 var(--r32) 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.sort-btn{background:var(--soft);border:none;border-radius:50px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.sort-btn.on{background:var(--black);color:var(--white)}
.count-label{font-size:13px;color:#888;margin-left:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;max-width:1200px;margin:0 auto;padding:0 var(--r32) 80px}

.card{background:var(--white);border:1.5px solid var(--line);border-radius:20px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08)}
.card-img{aspect-ratio:1;overflow:hidden;background:var(--soft);cursor:zoom-in;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card-img:hover img{transform:scale(1.04)}
.card-img .no-img{display:flex;align-items:center;justify-content:center;height:100%;font-size:32px;color:#ccc}
.card-body{padding:16px}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.s-badge{display:inline-block;border-radius:50px;padding:3px 11px;font-size:12px;font-weight:600}
.s0{background:#f5f5f5;color:#aaa}.s1{background:#eee;color:#666}.s2{background:#ddd;color:#444}.s3{background:#ccc;color:#333}.s4{background:#bbb;color:#222}.s5{background:#999;color:#fff}.s6{background:#777;color:#fff}.s7{background:#555;color:#fff}.s8{background:#333;color:#fff}.s9{background:#111;color:var(--lime)}.s10{background:var(--black);color:var(--lime)}
.card-label{font-size:14px;font-weight:600}
.card-date{font-size:11px;color:#999;font-family:'JetBrains Mono',monospace;margin-left:auto}
.card-prompt{font-size:13px;line-height:1.65;color:#444;font-style:italic;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-prompt.expanded{-webkit-line-clamp:unset}
.expand-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:10px}
.memo-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#999;margin-bottom:6px}
.memo{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:13px;resize:vertical;min-height:64px;transition:border-color .15s;line-height:1.5}
.memo:focus{outline:none;border-color:var(--black)}
.card-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
.save-indicator{font-size:12px;color:#2a7;margin-left:auto;opacity:0;transition:opacity .3s}
.save-indicator.on{opacity:1}

.empty{text-align:center;padding:80px 32px;color:#999}
.empty .ei{font-size:48px;margin-bottom:16px}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out;opacity:0;pointer-events:none;transition:opacity .25s}
.lightbox.on{opacity:1;pointer-events:auto}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:12px}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;text-align:center;padding:32px}
.login-screen h2{font-size:28px;font-weight:380;letter-spacing:-.5px}
.login-screen p{color:#666;font-size:16px}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--black);color:var(--white);padding:10px 22px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:all .25s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){nav{padding:0 16px}.hero,.toolbar{padding-left:16px;padding-right:16px}.grid{padding:0 16px 60px;grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div>대시보드</div>
  <div style="display:flex;gap:8px;align-items:center">
    <a class="btn btn-out" href="index.html" style="text-decoration:none">← 메인으로</a>
    <div id="user-info" style="display:none;align-items:center;gap:8px">
      <img id="user-photo" style="width:28px;height:28px;border-radius:50%;object-fit:cover" src="" alt="">
      <span id="user-name" style="font-size:14px;font-weight:500"></span>
    </div>
    <button class="btn btn-out" id="auth-btn" onclick="handleAuth()">로그인</button>
  </div>
</nav>

<div id="login-screen" class="login-screen" style="display:none">
  <div style="font-size:48px">🔒</div>
  <h2>로그인이 필요해요</h2>
  <p>저장된 이미지를 보려면 Google 계정으로 로그인하세요.</p>
  <button class="btn btn-dark" onclick="handleAuth()" style="padding:13px 32px">Google로 로그인</button>
</div>

<div id="main-content" style="display:none">
  <div class="hero">
    <h1>저장된 이미지</h1>
    <p class="hero-sub" id="hero-sub">불러오는 중...</p>
  </div>

  <div class="toolbar">
    <button class="sort-btn on" id="sort-date" onclick="setSort('date')">최신순</button>
    <button class="sort-btn" id="sort-score" onclick="setSort('score')">점수순</button>
    <span class="count-label" id="count-label"></span>
  </div>

  <div class="grid" id="results-grid"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('on')">
  <img id="lightbox-img">
</div>
<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBGQDVVPuW4-eTUuazuiBpHCW7cZSKy6Pc",
  authDomain: "metacog-unicorn-imagegen.firebaseapp.com",
  projectId: "metacog-unicorn-imagegen",
  storageBucket: "metacog-unicorn-imagegen.firebasestorage.app",
  messagingSenderId: "911788920186",
  appId: "1:911788920186:web:d1acd902d81a9a8d199ac3"
});
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;
let allResults = [];
let currentSort = 'date';

const scoreLabel = {
  0:'⏸️ 미완료', 1:'😴 아쉬웠어요', 2:'🤔 조금 더!', 3:'😊 잘했어요!',
  4:'🌟 멋져요!', 5:'🏆 훌륭해요!', 6:'💎 대단해요!', 7:'🔥 놀라워요!',
  8:'✨ 최고예요!', 9:'🌈 완벽해요!', 10:'👑 전설이에요!'
};

auth.onAuthStateChanged(user => {
  currentUser = user;
  const authBtn = document.getElementById('auth-btn');
  const userInfo = document.getElementById('user-info');
  if (user) {
    authBtn.textContent = '로그아웃';
    userInfo.style.display = 'flex';
    document.getElementById('user-photo').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    loadResults();
  } else {
    authBtn.textContent = '로그인';
    userInfo.style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    allResults = [];
  }
});

function handleAuth() {
  if (currentUser) {
    auth.signOut();
  } else {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => toast('로그인 실패: ' + e.message));
  }
}

async function loadResults() {
  document.getElementById('hero-sub').textContent = '불러오는 중...';
  document.getElementById('results-grid').innerHTML = '';
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('results')
      .orderBy('createdAt', 'desc').get();
    allResults = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderResults();
  } catch(e) {
    console.error(e);
    document.getElementById('hero-sub').textContent = '불러오기 실패';
    toast('데이터 로드 실패: ' + e.message);
  }
}

function setSort(type) {
  currentSort = type;
  document.getElementById('sort-date').classList.toggle('on', type === 'date');
  document.getElementById('sort-score').classList.toggle('on', type === 'score');
  renderResults();
}

function renderResults() {
  const sorted = [...allResults].sort((a, b) => {
    if (currentSort === 'score') return b.score - a.score;
    const ta = a.createdAt?.seconds || 0;
    const tb = b.createdAt?.seconds || 0;
    return tb - ta;
  });

  const grid = document.getElementById('results-grid');
  document.getElementById('count-label').textContent = `총 ${sorted.length}개`;
  document.getElementById('hero-sub').textContent = `${sorted.length}개의 이미지가 저장되어 있어요.`;

  if (!sorted.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="ei">🎨</div><p>아직 저장된 이미지가 없어요.<br>메인 페이지에서 이미지를 생성해보세요!</p></div>`;
    return;
  }

  grid.innerHTML = sorted.map(r => {
    const date = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleDateString('ko-KR', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const scoreCls = Math.min(r.score, 10);
    const label = scoreLabel[r.score] || `⭐ ${r.score}점`;
    return `
    <div class="card" id="card-${r.id}">
      <div class="card-img" onclick="openLightbox('${r.imageUrl}')">
        ${r.imageUrl ? `<img src="${r.imageUrl}" alt="생성 이미지" loading="lazy">` : '<div class="no-img">🎨</div>'}
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="s-badge s${scoreCls}">${label}</span>
          <span class="card-label">${r.label || ''} 학생 · ${r.studentNum}번</span>
          <span class="card-date">${date}</span>
        </div>
        <p class="card-prompt" id="prompt-${r.id}">${r.promptKo || r.promptEn || ''}</p>
        <button class="expand-btn" onclick="togglePrompt('${r.id}')">더 보기 ▾</button>
        <div class="memo-label">메모</div>
        <textarea class="memo" id="memo-${r.id}" placeholder="메모를 입력하세요..." onblur="saveMemo('${r.id}', this.value)">${r.memo || ''}</textarea>
        <div class="card-actions">
          <button class="btn-red btn" onclick="deleteResult('${r.id}', '${r.imagePath}')">🗑 삭제</button>
          <span class="save-indicator" id="si-${r.id}">✓ 저장됨</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togglePrompt(id) {
  const el = document.getElementById(`prompt-${id}`);
  const btn = el.nextElementSibling;
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? '접기 ▴' : '더 보기 ▾';
}

async function saveMemo(docId, memo) {
  if (!currentUser) return;
  try {
    await db.collection('users').doc(currentUser.uid).collection('results').doc(docId).update({ memo });
    const si = document.getElementById(`si-${docId}`);
    si.classList.add('on');
    setTimeout(() => si.classList.remove('on'), 2000);
    const r = allResults.find(r => r.id === docId);
    if (r) r.memo = memo;
  } catch(e) {
    toast('메모 저장 실패');
  }
}

async function deleteResult(docId, imagePath) {
  if (!confirm('이 결과를 삭제할까요?')) return;
  try {
    await db.collection('users').doc(currentUser.uid).collection('results').doc(docId).delete();
    if (imagePath) {
      await storage.ref(imagePath).delete().catch(() => {});
    }
    allResults = allResults.filter(r => r.id !== docId);
    const card = document.getElementById(`card-${docId}`);
    if (card) card.remove();
    document.getElementById('count-label').textContent = `총 ${allResults.length}개`;
    toast('삭제 완료');
  } catch(e) {
    toast('삭제 실패: ' + e.message);
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('on');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2800);
}
</script>
</body>
</html>
